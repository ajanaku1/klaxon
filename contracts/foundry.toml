[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.33"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[rpc_endpoints]
zerog_testnet = "${ZEROG_TESTNET_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
local = "http://127.0.0.1:8545"

# 0G has a block explorer (chainscan-galileo.0g.ai) but no etherscan-compatible
# verify endpoint — verification is manual / via 0G docs.
